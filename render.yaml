services:
  # ── Backend FastAPI Service ──────────────────────────────────
  - type: web
    name: aegis-health-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: RENDER
        value: "true"
      - key: DISABLE_SHAP
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Frontend React Static Site ───────────────────────────────
  - type: web
    name: aegis-health-site
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          name: aegis-health-api
          type: web
          property: hostURL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
